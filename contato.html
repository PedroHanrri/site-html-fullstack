<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
    <header>
        <h1>Contato</h1>
        <h3>Entrem em contato Consco:</h3>
    </header>

    <main>
        <form>

            <label for="nome-usuario">Seu Nome Completo:</label>
            <input type="text"
            id="nome-usuario"
            name="nome"
            placeholder="Seu nome completo..."
            required
            >

            <br>

            <label for="email">Digite Seu Email:</label>
            <input type="email"
            name="email" 
            id="email"
            placeholder="Seu email..."
            required
            >

            <br>

            <label for="telefone">Telefone:</label>
            <input type="number"
            name="telefone" 
            id="telefone"
            placeholder="Seu Numero..."
            required
            >

            <br>
            <br>

            <label for="assunto-usuario">Coloque seu assunto aqui:</label>
            <textarea 
            name="assunto-usuario" 
            id="assunto-usuario" 
            placeholder="Seu Assunto..."></textarea>

            <button type="submit">Enviar</button>
            
        </form>

        <h3>Instruções da pagina:</h3>
        <nav><a href="index.html">Voltar para a pagina Principal</a></nav>
    </main>

    <footer>
    </footer>
</body>
</html>
